<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Allied Security — Quote Generator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #0a1628;
  --bg-card: rgba(255,255,255,0.04);
  --bg-input: rgba(255,255,255,0.07);
  --border: rgba(255,255,255,0.12);
  --border-input: rgba(255,255,255,0.15);
  --text-primary: #e2e8f0;
  --text-secondary: #94a3b8;
  --text-muted: #475569;
  --accent: #60a5fa;
  --font-body: 'DM Sans', sans-serif;
  --font-mono: 'DM Mono', monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0a1628!important;color:#e2e8f0!important;font-family:var(--font-body);min-height:100vh}
input,select,textarea,button{font-family:inherit}
input:focus,select:focus{outline:none;border-color:rgba(96,165,250,0.4)!important}
::placeholder{color:var(--text-muted)}
select option{background:#1a1f2e;color:var(--text-primary)}
input[type="date"]::-webkit-calendar-picker-indicator,
input[type="time"]::-webkit-calendar-picker-indicator{filter:invert(0.7)}

.container{max-width:980px;margin:0 auto;padding:32px 24px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px}
.header h1{font-size:28px;font-weight:700;background:linear-gradient(135deg,#93c5fd,#c4b5fd);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header p{color:var(--text-muted);font-size:13px;margin-top:4px}

.section{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:20px}
.section-title{font-size:14px;font-weight:800;color:#93c5fd;letter-spacing:1.5px;margin-bottom:16px;text-transform:uppercase}

.form-grid{display:grid;gap:14px 20px}
.form-grid.cols-2{grid-template-columns:1fr 1fr}
.span-full{grid-column:1/-1}

label.field-label{display:block;font-size:12px;font-weight:700;color:#93c5fd;margin-bottom:6px;letter-spacing:0.5px}
.input{width:100%;padding:10px 14px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.18);border-radius:8px;color:#f1f5f9;font-size:14px}
.input-mono{font-family:var(--font-mono);font-weight:600;font-size:16px}

.btn{padding:10px 20px;border:none;border-radius:10px;font-weight:600;font-size:14px;cursor:pointer;font-family:var(--font-body);transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-primary{background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff}
.btn-secondary{background:rgba(255,255,255,0.06);border:1px solid var(--border-input);color:var(--text-secondary)}
.btn-success{background:#059669;color:#fff}
.btn-danger-sm{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#ef4444;padding:6px 14px;border-radius:8px;font-size:13px;cursor:pointer;font-family:var(--font-body);font-weight:600}
.btn-danger-sm:hover{background:rgba(239,68,68,0.2)}

.rates-panel{background:rgba(37,99,235,0.06);border:1px solid rgba(37,99,235,0.15);border-radius:12px;padding:16px 20px}
.rates-title{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:1.5px;margin-bottom:4px}
.rates-region{font-size:14px;font-weight:600;color:#93c5fd;margin-bottom:10px}
.rates-row{display:flex;justify-content:space-between;padding:3px 0;font-family:var(--font-mono)}
.rates-label{color:var(--text-secondary);font-size:12px}
.rates-value{color:var(--text-primary);font-size:13px;font-weight:600}
.rates-note{color:var(--text-muted);font-size:11px;margin-top:8px;font-style:italic}

.sched-row{display:grid;grid-template-columns:1.2fr 1fr 1fr 0.7fr auto;gap:12px;align-items:end;padding:14px 16px;background:rgba(255,255,255,0.015);border:1px solid rgba(255,255,255,0.04);border-radius:12px;margin-bottom:8px}

.quote-table{width:100%;border-collapse:collapse;font-size:13px}
.quote-table th{padding:10px 10px;text-align:left;border-bottom:2px solid rgba(96,165,250,0.2);color:var(--accent);font-size:11px;font-weight:700;letter-spacing:1px}
.quote-table th.right{text-align:right}
.quote-table td{padding:6px 10px}
.quote-table td.mono{font-family:var(--font-mono);font-size:12px;color:var(--text-secondary)}
.quote-table td.mono-right{font-family:var(--font-mono);font-size:12px;color:var(--text-secondary);text-align:right}
.quote-table td.charge{font-family:var(--font-mono);font-size:13px;font-weight:600;color:var(--text-primary);text-align:right}
.quote-table tr.row-border{border-bottom:1px solid rgba(255,255,255,0.06)}
.ph-badge{margin-left:6px;background:rgba(239,68,68,0.15);color:#ef4444;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600}

.totals{display:flex;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.totals-inner{width:280px}
.total-row{display:flex;justify-content:space-between;padding:6px 0;font-family:var(--font-mono)}
.total-row.grand{border-top:2px solid rgba(96,165,250,0.3);margin-top:4px;padding-top:8px}
.total-row .t-label{font-size:13px}
.total-row .t-value{font-size:13px;font-weight:500}
.total-row.grand .t-label,.total-row.grand .t-value{font-size:16px;font-weight:700;color:var(--accent)}

.footer-notes{font-size:11px;color:var(--text-muted);font-style:italic;line-height:1.8;padding:0 4px;margin-top:8px}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px)}
.modal{background:#1a1f2e;border-radius:16px;padding:32px;width:660px;max-height:80vh;overflow:auto;border:1px solid var(--border);box-shadow:0 24px 80px rgba(0,0,0,0.5)}
.modal h2{color:var(--text-primary);font-size:22px;font-weight:700;margin:0}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.modal-close{background:rgba(255,255,255,0.06);border:none;color:var(--text-secondary);border-radius:8px;width:36px;height:36px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
.site-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-radius:8px;background:rgba(255,255,255,0.02)}
.site-region-badge{color:var(--accent);font-size:12px;font-family:var(--font-mono);background:rgba(96,165,250,0.1);padding:3px 10px;border-radius:6px}

@media print{
  .no-print{display:none!important}
  body{background:#fff!important;color:#111!important}
  @page{size:A4 portrait;margin:8mm 10mm 8mm 10mm}
  #pcontent{transform:none!important;width:100%!important;padding:0!important;max-width:100%!important}
  .print-section-block{page-break-inside:avoid}
  table{page-break-inside:auto}
  tr{page-break-inside:avoid;page-break-after:auto}
  thead{display:table-header-group}
}
  body{background:#fff!important}
  @page{size:A4;margin:10mm 12mm}
  .print-wrap{padding:10px 20px!important}
  .print-wrap h1{font-size:22px!important;margin-bottom:0!important}
  .print-wrap .co-info{font-size:10px!important;line-height:1.4!important;margin-bottom:10px!important}
  .print-wrap .sec-box{padding:12px 16px!important;margin-bottom:8px!important}
  .print-wrap .sec-box h3{font-size:11px!important;margin-bottom:6px!important}
  .print-wrap .sec-box table{font-size:11px!important}
  .print-wrap .sec-box td{padding:2px 0!important}
  .print-wrap .rates-box{padding:10px!important;min-width:200px!important}
  .print-wrap .rates-box div{font-size:10px!important}
  .print-wrap .data-table{font-size:10px!important;margin-bottom:8px!important}
  .print-wrap .data-table th{padding:6px 8px!important}
  .print-wrap .data-table td{padding:3px 8px!important}
  .print-wrap .totals-box{margin-bottom:8px!important}
  .print-wrap .totals-box div{padding:3px 0!important;font-size:11px!important}
  .print-wrap .totals-box .grand-total{font-size:13px!important}
  .print-wrap .footer-print{font-size:9px!important;line-height:1.4!important}
  .print-wrap .logo-img{height:90px!important}
}
@media(max-width:768px){.form-grid.cols-2{grid-template-columns:1fr}.sched-row{grid-template-columns:1fr 1fr}}
</style>
</head>

function alliedPresetRate(preset,dateStr){
  if(!preset||preset==='custom'||!ALLIED_PRESET_RATES[preset])return 0;
  var r=ALLIED_PRESET_RATES[preset];
  if(isPH(dateStr))return r.ph;
  var dow=getDOW(dateStr);
  if(dow===0)return r.sun;
  if(dow===6)return r.sat;
  return r.monFri;
}

// calcShiftAllied: splits a shift across midnight, applying the correct
// day-type rate for each calendar day (same logic as calcShift but uses
// Allied flat-per-day-type rates instead of Citiguard day/night rates)

function hToTime(h){
  // Normalise to 0-24
  h=((h%24)+24)%24;
  var hh=Math.floor(h);
  var mm=Math.round((h-hh)*60);
  if(mm===60){hh++;mm=0;}
  return String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0');
}

function calcShiftAllied(startTime,endTime,dateStr,preset){

  var overnight=(end<=start);
  var segs=[];
  var cursor=start;
  function addSeg(from,to,ds){
    var hours=to-from;
    if(hours<=0)return;
    var rate=alliedPresetRate(preset,ds);
    // merge if same rate AND same day boundary (cursor matches)
    if(segs.length&&segs[segs.length-1].rate===rate){
      segs[segs.length-1].hours+=hours;
      segs[segs.length-1].segEnd=hToTime(to===24?0:to);
    } else {
      segs.push({hours:hours,rate:rate,
        segStart:hToTime(from),segEnd:hToTime(to===24?0:to)});
    }
  }
  if(!overnight){
    addSeg(start,end,dateStr);
  } else {
    addSeg(start,24,dateStr);        // first day: start → midnight
    var d2=nextDay(dateStr);
    addSeg(0,end,d2);                // second day: midnight → end
  }
  return segs;
}

// Timezone-safe date helpers
function parseDate(ds){const[y,m,d]=ds.split('-').map(Number);return new Date(y,m-1,d)}
function toDateStr(o){return o.getFullYear()+'-'+String(o.getMonth()+1).padStart(2,'0')+'-'+String(o.getDate()).padStart(2,'0')}
const DAY_NAMES=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
function getDayName(ds){return DAY_NAMES[parseDate(ds).getDay()]}
function getDOW(ds){return parseDate(ds).getDay()}
function isPH(ds){return NSW_PH.includes(ds)}
function nextDay(ds){const d=parseDate(ds);d.setDate(d.getDate()+1);return toDateStr(d)}
function timeToH(t){if(!t)return 0;const[h,m]=t.split(':').map(Number);return h+m/60}
function formatDate(ds){return parseDate(ds).toLocaleDateString('en-AU',{day:'2-digit',month:'2-digit',year:'numeric'})}
function fmtCur(v){return '$'+v.toLocaleString('en-AU',{minimumFractionDigits:2,maximumFractionDigits:2})}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}

function getRate(dow,isHol,isDay,rates){
  if(isHol)return rates.ph;
  if(dow===0)return rates.sun;
  if(dow===6)return rates.sat;
  return isDay?rates.day:rates.night;
}

function calcShift(startTime,endTime,dateStr,rates){
  const start=timeToH(startTime),end=timeToH(endTime);
  const overnight=(end<=start);
  const DB_S=6,DB_E=18;
  const sDow=getDOW(dateStr),sHol=isPH(dateStr);
  const eDate=overnight?nextDay(dateStr):dateStr;
  const eDow=getDOW(eDate),eHol=isPH(eDate);
  let segs=[];
  function add(from,to,dow,hol){
    let c=from;
    while(c<to){
      const isD=c>=DB_S&&c<DB_E;
      let b;
      if(c<DB_S)b=Math.min(DB_S,to);
      else if(c<DB_E)b=Math.min(DB_E,to);
      else b=to;
      if(b-c>0)segs.push({hours:b-c,rate:getRate(dow,hol,isD,rates)});
      c=b;
    }
  }
  if(!overnight){add(start,end,sDow,sHol)}
  else{add(start,24,sDow,sHol);add(0,end,eDow,eHol)}
  // merge
  let m=[];
  for(const s of segs){
    if(m.length&&m[m.length-1].rate===s.rate)m[m.length-1].hours+=s.hours;
    else m.push({...s});
  }
  return m;
}

// calcShiftFlat: like calcShift but uses a single flat rate (no day/night split)
// Used for Allied preset rates which are per-day-type, not per time-of-day
function calcShiftFlat(startTime,endTime,dateStr,rate){
  var start=timeToH(startTime),end=timeToH(endTime);
  var overnight=(end<=start);
  if(!overnight){
    return [{hours:end-start,rate:rate,segStart:startTime,segEnd:endTime}];
  } else {
    var segs=[];
    if(24-start>0)segs.push({hours:24-start,rate:rate,segStart:startTime,segEnd:'00:00'});
    if(end>0)segs.push({hours:end,rate:rate,segStart:'00:00',segEnd:endTime});
    return segs;
  }
}

function computeLineItems(){
  var co=COMPANIES[state.company_selected];
  if(co.useRegionRates){
    const rates=REGIONS[state.region];
    if(!rates)return[];
    let items=[];
    for(const row of state.scheduleRows){
      if(!row.date||!row.startTime||!row.endTime)continue;
      const segs=calcShift(row.startTime,row.endTime,row.date,rates);
      const charge=segs.reduce((s,x)=>s+x.hours*x.rate*row.quantity,0);
      items.push({date:row.date,dayName:getDayName(row.date),isPH:isPH(row.date),segments:segs,charge,quantity:row.quantity,startTime:row.startTime,endTime:row.endTime});
    }
    return items;
  } else {
    // Return sections with computed rows
    return state.sections.map(function(sec){
      var secRows=[];
      (sec.rows||[]).forEach(function(row){
        // Additional costs don't need a date
        if(sec.category!=='additional'&&!row.date)return;
        var qty=parseFloat(row.quantity)||1;
        if(sec.category==='additional'){
          // Additional costs: flat qty x unit price (no date required)
          var rate=parseFloat(row.rate)||0;
          var charge=rate*qty;
          secRows.push({date:'',dayName:'',isPH:false,
            segments:[{hours:1,rate:rate}],hours:1,rate:rate,
            charge:charge,quantity:qty,
            startTime:'',endTime:'',desc:row.desc||''});
        } else if((sec.category!=='additional')&&row.startTime&&row.endTime){
          // Time-based: use calcShift for day/night split
          // Build a rates-like object using preset or manual rate
          var baseRate=parseFloat(row.rate)||0;
          if(sec.category&&sec.category!=='custom'&&baseRate===0){
            baseRate=alliedPresetRate(sec.category,row.date);
          }
          // For preset sections: calculate each segment's rate from the rate table
          // For custom sections: use single rate (no split)
          var segs;
          if(sec.category&&sec.category!=='custom'&&ALLIED_PRESET_RATES[sec.category]){
            // Use calcShiftAllied: splits overnight, applies correct day-type rate per calendar day
            segs=calcShiftAllied(row.startTime,row.endTime,row.date,sec.category);
          } else {
            segs=calcShiftFlat(row.startTime,row.endTime,row.date,baseRate);
          }
          var totalHrs=segs.reduce(function(s,sg){return s+sg.hours;},0);
          var charge=segs.reduce(function(s,sg){return s+sg.hours*sg.rate*qty;},0);
          secRows.push({date:row.date,dayName:getDayName(row.date),isPH:isPH(row.date),
            segments:segs,hours:totalHrs,rate:baseRate,
            charge:charge,quantity:qty,
            startTime:row.startTime,endTime:row.endTime,desc:row.desc||''});
        } else {
          // Mobile patrol or no times: flat hrs=1 x rate
          var rate=parseFloat(row.rate)||0;
          if(sec.category&&sec.category!=='custom'&&rate===0){
            rate=alliedPresetRate(sec.category,row.date);
          }
          var hrs=state.mobilePatrol?1:(parseFloat(row.hours)||0);
          secRows.push({date:row.date,dayName:getDayName(row.date),isPH:isPH(row.date),
            segments:[{hours:hrs,rate:rate}],hours:hrs,rate:rate,
            charge:hrs*rate*qty,quantity:qty,
            startTime:row.startTime||'',endTime:row.endTime||'',desc:row.desc||''});
        }
      });
      var secTotal=secRows.reduce(function(s,r){return s+r.charge;},0);
      return {id:sec.id,label:sec.label,category:sec.category,rows:secRows,subtotal:secTotal};
    });
  }
}

    (COMPANIES[state.company_selected].useRegionRates?
      '<div style="background:#eef2ff;border:1px solid #c7d2fe;border-radius:6px;padding:10px 14px;min-width:220px">'+
      '<div style="font-size:10px;font-weight:800;color:#1e3a5f;letter-spacing:1px;margin-bottom:2px">RATES PER HOUR</div>'+
      '<div style="font-size:13px;font-weight:700;color:#1e3a5f;margin-bottom:6px">'+state.region+'</div>'+rr+
      '<div style="font-size:9px;color:#64748b;margin-top:4px;font-style:italic">*Rates exclude GST</div>'+
      '</div>':'')+
    '</div>'+

    printTableHTML+

    '<div style="display:flex;justify-content:flex-end;margin-bottom:10px"><div style="width:320px">'+
    '<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:13px;font-family:var(--font-mono);color:#334155"><span>Subtotal:</span><span>'+ft(sub)+'</span></div>'+
    '<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:13px;font-family:var(--font-mono);color:#334155"><span>GST (10%):</span><span>'+ft(gst)+'</span></div>'+
    '<div style="display:flex;justify-content:space-between;padding:6px 0;font-size:16px;font-weight:800;font-family:var(--font-mono);color:#0f172a;border-top:2px solid #0f172a;margin-top:2px"><span style="white-space:nowrap">Total (inc. GST):</span><span style="white-space:nowrap;margin-left:16px">'+ft(total)+'</span></div>'+
    '</div></div>'+

    '<div style="font-size:10px;color:#64748b;font-style:italic;line-height:1.5">'+
    '* A 4 hour cancellation fee applies for all cancellations within 2 hours of the start time<br>'+
    '* A 4 hour minimum charge applies for each engagement in accordance with the Security Services Award 2020 (MA000016)</div>'+

    '</div></div>';
}

function onSiteChange(val){
  state.siteName=val;
  const m=Object.entries(siteMap).find(([s])=>val.toLowerCase().includes(s.toLowerCase())||s.toLowerCase().includes(val.toLowerCase()));
  if(m)state.region=m[1];
  render();
}

// ── Section & Row management (Allied) ──────────────────────────────────────
function upRow(secId,rowId,field,value){
  var sec=state.sections.find(function(s){return s.id===secId;});
  if(!sec)return;
  var row=sec.rows.find(function(r){return r.id===rowId;});
  if(row){row[field]=value;}
  // auto-fill preset rate when date changes
  if(field==='date'&&sec.category&&sec.category!=='custom'){
    row.rate=alliedPresetRate(sec.category,value);
  }
  render();
}

function addRow(secId){
  var sec=state.sections.find(function(s){return s.id===secId;});
  if(!sec)return;
  var last=sec.rows[sec.rows.length-1];
  var nextDate='';
  if(last&&last.date){
    var d=parseDate(last.date);d.setDate(d.getDate()+1);nextDate=toDateStr(d);
  }
  var newRate=0;
  if(sec.category&&sec.category!=='custom'&&nextDate){
    newRate=alliedPresetRate(sec.category,nextDate);
  } else if(last){
    newRate=last.rate||0;
  }
  sec.rows.push({
    id:state.nextRowId++,
    date:nextDate,
    startTime:last?last.startTime:'',
    endTime:last?last.endTime:'',
    hours:last?last.hours:1,
    rate:newRate,
    quantity:last?last.quantity:1,
    desc:''
  });
  render();
}

function rmRow(secId,rowId){
  var sec=state.sections.find(function(s){return s.id===secId;});
  if(!sec)return;
  if(sec.rows.length<=1)return;
  sec.rows=sec.rows.filter(function(r){return r.id!==rowId;});
  render();
}

function addSection(type){
  if(type==='additional'){
    state.sections.push({
      id:state.nextSectionId++,label:'Additional Costs',category:'additional',
      rows:[{id:state.nextRowId++,date:'',startTime:'',endTime:'',hours:1,rate:0,quantity:1,desc:''}]
    });
  } else {
    state.sections.push({
      id:state.nextSectionId++,label:'New Section',category:'Ad-Hoc Static Metro',
      rows:[{id:state.nextRowId++,date:'',startTime:'',endTime:'',hours:1,rate:0,quantity:1,desc:''}]
    });
  }
  render();
}

function upSectionCategory(secId,val){
  var sec=state.sections.find(function(s){return s.id===secId;});
  if(!sec)return;
  sec.category=val;
  // re-fill rates for all rows when category changes
  sec.rows.forEach(function(row){
    if(row.date&&val!=='custom'){row.rate=alliedPresetRate(val,row.date);}
    else if(val==='custom'){row.rate=0;}
  });
  render();
}

function rmSection(secId){
  if(state.sections.length<=1)return;
  state.sections=state.sections.filter(function(s){return s.id!==secId;});
  render();
}

function upSectionLabel(secId,val){
  var sec=state.sections.find(function(s){return s.id===secId;});
  if(sec)sec.label=val;
  render();
}

// Legacy functions for Citiguard
function upSched(id,field,value){
  if(!state.scheduleRows)state.scheduleRows=[];
  const r=state.scheduleRows.find(x=>x.id===id);
  if(r)r[field]=value;
  render();
}
function addSched(){
  if(!state.scheduleRows)state.scheduleRows=[];
  const last=state.scheduleRows[state.scheduleRows.length-1];
  let nextDate='';
  if(last&&last.date){
    const d=parseDate(last.date);d.setDate(d.getDate()+1);nextDate=toDateStr(d);
  }
  if(!state.nextSchedId)state.nextSchedId=200;
  state.scheduleRows.push({
    id:state.nextSchedId++,
    date:nextDate,
    startTime:last?last.startTime:'19:00',
    endTime:last?last.endTime:'07:00',
    quantity:last?last.quantity:1
  });
  render();
}
function rmSched(id){
  if(!state.scheduleRows)return;
  state.scheduleRows=state.scheduleRows.filter(r=>r.id!==id);
  render();
}

function openSiteModal(){
  const existing=document.getElementById('site-modal');
  if(existing)existing.remove();
  const sorted=Object.entries(siteMap).sort((a,b)=>a[1].localeCompare(b[1])||a[0].localeCompare(b[0]));
  const rOpts=Object.keys(REGIONS).map(r=>'<option value="'+r+'">'+r+'</option>').join('');
  const sRows=sorted.map(([site,region])=>
    '<div class="site-row" style="margin-bottom:2px"><span style="color:var(--text-primary);font-size:14px">'+esc(site)+'</span>'+
    '<div style="display:flex;align-items:center;gap:12px"><span class="site-region-badge">'+region+'</span>'+
    '<button onclick="rmSite(\''+site.replace(/'/g,"\\'")+'\')" style="background:none;border:none;color:#ef4444;cursor:pointer;font-size:14px;padding:2px 6px">✕</button></div></div>'
  ).join('');

  const m=document.createElement('div');
  m.className='modal-overlay';m.id='site-modal';
  m.innerHTML='<div class="modal"><div class="modal-header"><h2>Site ↔ Region Manager</h2>'+
    '<button class="modal-close" onclick="closeSiteModal()">✕</button></div>'+
    '<div style="display:flex;gap:10px;margin-bottom:20px">'+
    '<input id="ns-name" class="input" style="flex:1" placeholder="Site name (e.g. TAFE NSW Penrith)" onkeydown="if(event.key===\'Enter\')addSiteEntry()">'+
    '<select id="ns-reg" class="input" style="width:auto">'+rOpts+'</select>'+
    '<button class="btn btn-primary" onclick="addSiteEntry()">+ Add</button></div>'+
    '<div style="display:flex;flex-direction:column;gap:2px">'+sRows+'</div>'+
    (sorted.length===0?'<p style="color:var(--text-muted);text-align:center;padding:40px;font-size:14px">No sites configured yet.</p>':'')+
    '</div>';
  document.body.appendChild(m);
}

function closeSiteModal(){const e=document.getElementById('site-modal');if(e)e.remove()}
function addSiteEntry(){
  const n=document.getElementById('ns-name'),r=document.getElementById('ns-reg');
  if(n&&n.value.trim()){siteMap[n.value.trim()]=r.value;saveSiteMap();n.value='';openSiteModal()}
}
function rmSite(s){delete siteMap[s];saveSiteMap();openSiteModal()}


render();
</script>
